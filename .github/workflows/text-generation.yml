# ============================================================
# 📝 Polination AI — Text Generation
# ============================================================
# تولید متن با هوش مصنوعی Polination
# ============================================================

name: "📝 Text Generation"

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: "Your prompt"
        required: true
        type: string

      model:
        description: "AI Model"
        required: true
        default: "openai"
        type: choice
        options:
          - openai
          - mistral
          - llama
          - claude

      temperature:
        description: "Creativity (0.0 - 1.5)"
        required: false
        default: "0.8"
        type: string

      system_message:
        description: "System message (role of AI)"
        required: false
        default: "You are a creative and helpful AI assistant. Write detailed, well-structured, and engaging content. Use markdown formatting when appropriate."
        type: string

      upload_method:
        description: "Upload Method"
        required: true
        default: "repository"
        type: choice
        options:
          - repository
          - release

      release_tag:
        description: "Release Tag (empty = auto)"
        required: false
        default: ""
        type: string

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: "🔧 Install tools"
        run: sudo apt-get update -qq && sudo apt-get install -y jq

      # ======== Generate Text ========
      - name: "📝 Generate Text"
        id: gen
        shell: bash
        run: |
          PROMPT="${{ github.event.inputs.prompt }}"
          MODEL="${{ github.event.inputs.model }}"
          TEMP="${{ github.event.inputs.temperature }}"
          SYS="${{ github.event.inputs.system_message }}"

          # Validate temperature
          [[ ! "$TEMP" =~ ^[0-9.]+$ ]] && TEMP=0.8

          mkdir -p output

          TS=$(date +%Y%m%d_%H%M%S)

          echo "::group::Generating text with $MODEL"

          # Build JSON payload safely using jq (handles all special chars)
          JSON_FILE="/tmp/payload_${TS}.json"

          jq -n \
            --arg sys "$SYS" \
            --arg usr "$PROMPT" \
            --arg model "$MODEL" \
            --argjson temp "$TEMP" \
            '{
              messages: [
                {role: "system", content: $sys},
                {role: "user", content: $usr}
              ],
              model: $model,
              temperature: $temp
            }' > "$JSON_FILE"

          echo "Payload:"
          cat "$JSON_FILE"
          echo ""
          echo "Sending request..."

          # Send request using the JSON file
          HTTP=$(curl -s --max-time 120 \
            -w "\n%{http_code}" \
            -o "/tmp/response_${TS}.txt" \
            -X POST "https://text.pollinations.ai/" \
            -H "Content-Type: application/json" \
            -d @"$JSON_FILE" 2>&1)

          # Extract HTTP code (last line)
          HTTP_CODE=$(echo "$HTTP" | tail -1)

          echo "HTTP Status: $HTTP_CODE"

          if [[ "$HTTP_CODE" != "200" ]]; then
            echo "❌ Request failed!"
            echo "Response:"
            cat "/tmp/response_${TS}.txt"
            exit 1
          fi

          # Read response
          RESPONSE=$(cat "/tmp/response_${TS}.txt")

          # Try to parse as JSON, fallback to raw text
          if echo "$RESPONSE" | jq -e . >/dev/null 2>&1; then
            # It's valid JSON, try to extract text
            TEXT=$(echo "$RESPONSE" | jq -r '. // .choices[0].message.content // .content // empty' 2>/dev/null)
          else
            TEXT="$RESPONSE"
          fi

          if [ -z "$TEXT" ] || [ "$TEXT" = "null" ]; then
            TEXT="$RESPONSE"
          fi

          # Save output
          OUT_FILE="output/generated_${TS}.md"

          cat > "$OUT_FILE" << HEADER
          # Generated by Polination AI

          | Key | Value |
          |-----|-------|
          | **Model** | ${MODEL} |
          | **Date** | $(date '+%Y-%m-%d %H:%M:%S') |
          | **Temperature** | ${TEMP} |
          | **Prompt** | ${PROMPT} |

          ---

          HEADER

          echo "$TEXT" >> "$OUT_FILE"

          # Save raw JSON
          echo "$RESPONSE" > "output/raw_${TS}.json"

          CHARS=$(echo "$TEXT" | wc -c)
          WORDS=$(echo "$TEXT" | wc -w)

          echo "✅ Text generated!"
          echo "📝 Characters: $CHARS"
          echo "📝 Words: $WORDS"

          # Output first 500 chars as preview
          echo ""
          echo "--- Preview ---"
          echo "$TEXT" | head -c 500
          echo ""
          echo "--- End Preview ---"

          echo "file=$OUT_FILE" >> "$GITHUB_OUTPUT"
          echo "chars=$CHARS" >> "$GITHUB_OUTPUT"
          echo "words=$WORDS" >> "$GITHUB_OUTPUT"

          echo "::endgroup::"

      # ======== Summary ========
      - name: "📊 Summary"
        if: always()
        shell: bash
        run: |
          echo "╔═══════════════════════════════════════╗"
          echo "║   Text Generation Complete            ║"
          echo "╠═══════════════════════════════════════╣"
          echo "║ Model     : ${{ github.event.inputs.model }}"
          echo "║ Characters: ${{ steps.gen.outputs.chars }}"
          echo "║ Words     : ${{ steps.gen.outputs.words }}"
          echo "║ Upload    : ${{ github.event.inputs.upload_method }}"
          echo "╚═══════════════════════════════════════╝"

      # ======== Upload to Repository ========
      - name: "📦 Push to Repository"
        if: github.event.inputs.upload_method == 'repository'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add output/
          git commit -m "Text: ${{ github.event.inputs.prompt }} [skip ci]" || echo "No changes"
          git push

      # ======== Upload to Release ========
      - name: "🚀 Upload to Release"
        if: github.event.inputs.upload_method == 'release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag != '' && github.event.inputs.release_tag || format('txt-{0}', github.run_number) }}
          name: "AI Text — ${{ github.event.inputs.model }}"
          body: |
            ## Generated Text
            - **Model:** ${{ github.event.inputs.model }}
            - **Prompt:** ${{ github.event.inputs.prompt }}
            - **Characters:** ${{ steps.gen.outputs.chars }}
            - **Words:** ${{ steps.gen.outputs.words }}
          files: output/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ======== Cleanup ========
      - name: "🧹 Cleanup"
        if: always()
        run: rm -rf output /tmp/payload_*.json /tmp/response_*.txt
