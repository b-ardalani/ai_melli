# ============================================================
# 🎨 Polination AI — Image Generation
# ============================================================
# تولید تصویر با هوش مصنوعی Polination
# ============================================================

name: "🎨 Image Generation"

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: "Prompt (English recommended)"
        required: true
        type: string

      negative_prompt:
        description: "Negative prompt (what to avoid)"
        required: false
        default: ""
        type: string

      model:
        description: "AI Model"
        required: true
        default: "flux"
        type: choice
        options:
          - flux
          - turbo
          - flux-realism
          - flux-cablyai
          - flux-anime
          - flux-3d
          - flux-pro
          - any-dark

      width:
        description: "Width (px)"
        required: false
        default: "1024"
        type: string

      height:
        description: "Height (px)"
        required: false
        default: "1024"
        type: string

      num_images:
        description: "Number of images (1-10)"
        required: false
        default: "1"
        type: string

      seed:
        description: "Seed (empty = random)"
        required: false
        default: ""
        type: string

      nologo:
        description: "Remove watermark"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

      upload_method:
        description: "Upload Method"
        required: true
        default: "repository"
        type: choice
        options:
          - repository
          - release

      release_tag:
        description: "Release Tag (empty = auto)"
        required: false
        default: ""
        type: string

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: "🔧 Install tools"
        run: sudo apt-get update -qq && sudo apt-get install -y jq

      # ======== Generate Images ========
      - name: "🎨 Generate Images"
        id: gen
        shell: bash
        run: |
          PROMPT="${{ github.event.inputs.prompt }}"
          NEGATIVE="${{ github.event.inputs.negative_prompt }}"
          MODEL="${{ github.event.inputs.model }}"
          WIDTH="${{ github.event.inputs.width }}"
          HEIGHT="${{ github.event.inputs.height }}"
          NUM="${{ github.event.inputs.num_images }}"
          SEED="${{ github.event.inputs.seed }}"
          NOLOGO="${{ github.event.inputs.nologo }}"

          # Validation
          [[ ! "$NUM" =~ ^[0-9]+$ || "$NUM" -lt 1 ]] && NUM=1
          [[ "$NUM" -gt 10 ]] && NUM=10
          [[ ! "$WIDTH" =~ ^[0-9]+$ ]] && WIDTH=1024
          [[ ! "$HEIGHT" =~ ^[0-9]+$ ]] && HEIGHT=1024

          mkdir -p output

          TS=$(date +%Y%m%d_%H%M%S)
          SAFE=$(echo "$PROMPT" | head -c 50 | tr ' ' '_' | tr -cd 'a-zA-Z0-9_-')

          # Build negative prompt param
          NEG_PARAM=""
          if [ -n "$NEGATIVE" ]; then
            NEG_ENC=$(python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1]))" "$NEGATIVE")
            NEG_PARAM="&negative=${NEG_ENC}"
          fi

          OK=0
          FAIL=0

          for i in $(seq 1 "$NUM"); do
            echo "::group::Image $i / $NUM"

            if [ -n "$SEED" ]; then
              CSEED=$((SEED + i - 1))
            else
              CSEED=$RANDOM
            fi

            OUT="output/${SAFE}_${TS}_${i}.png"

            # Safe URL encode with python
            ENC=$(python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1]))" "$PROMPT")

            URL="https://image.pollinations.ai/prompt/${ENC}?width=${WIDTH}&height=${HEIGHT}&model=${MODEL}&nologo=${NOLOGO}&seed=${CSEED}&nofeed=true${NEG_PARAM}"

            echo "URL: $URL"
            echo "Downloading..."

            HTTP=$(curl -L --max-time 180 -w "%{http_code}" -o "$OUT" "$URL" 2>&1)

            if [[ "$HTTP" == "200" ]] && [[ -f "$OUT" ]] && [[ $(stat -c%s "$OUT") -gt 500 ]]; then
              SZ=$(du -h "$OUT" | cut -f1)
              echo "✅ Done! Size: $SZ"
              OK=$((OK + 1))
            else
              echo "❌ Failed (HTTP $HTTP)"
              rm -f "$OUT"
              FAIL=$((FAIL + 1))
            fi

            echo "::endgroup::"

            if [[ $i -lt "$NUM" ]]; then
              sleep 3
            fi
          done

          echo "success=$OK" >> "$GITHUB_OUTPUT"
          echo "failed=$FAIL" >> "$GITHUB_OUTPUT"

      # ======== Summary ========
      - name: "📊 Summary"
        if: always()
        shell: bash
        run: |
          echo "╔═══════════════════════════════════════╗"
          echo "║   Image Generation Complete           ║"
          echo "╠═══════════════════════════════════════╣"
          echo "║ Model    : ${{ github.event.inputs.model }}"
          echo "║ Images   : ${{ steps.gen.outputs.success }} ok, ${{ steps.gen.outputs.failed }} fail"
          echo "║ Upload   : ${{ github.event.inputs.upload_method }}"
          echo "╚═══════════════════════════════════════╝"

      # ======== Upload to Repository ========
      - name: "📦 Push to Repository"
        if: github.event.inputs.upload_method == 'repository'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add output/
          git commit -m "Image: ${{ github.event.inputs.prompt }} [skip ci]" || echo "No changes"
          git push

      # ======== Upload to Release ========
      - name: "🚀 Upload to Release"
        if: github.event.inputs.upload_method == 'release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag != '' && github.event.inputs.release_tag || format('img-{0}', github.run_number) }}
          name: "AI Image — ${{ github.event.inputs.model }}"
          body: |
            ## Generated Images
            - **Model:** ${{ github.event.inputs.model }}
            - **Prompt:** ${{ github.event.inputs.prompt }}
            - **Negative:** ${{ github.event.inputs.negative_prompt }}
            - **Size:** ${{ github.event.inputs.width }}x${{ github.event.inputs.height }}
            - **Success:** ${{ steps.gen.outputs.success }}
            - **Failed:** ${{ steps.gen.outputs.failed }}
          files: output/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ======== Cleanup ========
      - name: "🧹 Cleanup"
        if: github.event.inputs.upload_method == 'repository'
        run: rm -rf output
